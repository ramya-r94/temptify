name: CI-CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |
            # Clone repo if not exists
            if [ ! -d "temptify" ]; then
              git clone https://github.com/ramya-r94/temptify.git
            fi

            cd temptify

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Stop and remove old container
            docker stop temptify-container || true
            docker rm temptify-container || true

            # Remove old image
            docker rmi temptify-image || true

            # Build Docker image
            docker build -t temptify-image .

            # Run new container
            docker run -d \
              --restart unless-stopped \
              -p 80:80 \
              --name temptify-container \
              temptify-image

            # Cleanup unused images
            docker image prune -f
